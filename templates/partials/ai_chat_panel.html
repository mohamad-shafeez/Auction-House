<!-- EventEase AI Floating Chat Panel -->
<div id="ai-chat-widget" class="ai-widget-collapsed" data-role="{{ session.role }}">
    
    <!-- Collapsed Button -->
    <button id="ai-toggle-btn" class="ai-btn" aria-label="Open AI Assistant">
        <span class="ai-icon">✨</span>
        <span class="ai-label">Ask AI</span>
    </button>

    <!-- Expanded Panel -->
    <div id="ai-chat-panel" class="ai-panel">
        <div class="ai-header">
            <div class="ai-header-info">
                <h3>EventEase AI</h3>
                <p style="font-size: 0.85em; color: #666; margin: 4px 0 0 0;">Powered by Gemini</p>
            </div>
            <button id="ai-close-btn" class="ai-close">&times;</button>
        </div>

        <div class="ai-messages" id="ai-messages">
            <!-- Messages will be injected here by JS -->
        </div>
        
        <div class="ai-typing-indicator" id="ai-typing" style="display: none;">
            <span></span><span></span><span></span>
        </div>

        <div class="ai-input-area">
            <input type="text" id="ai-input" placeholder="Ask EventEase AI..." autocomplete="off">
            <button id="ai-send-btn" class="ai-send">➤</button>
        </div>
        <div class="ai-footer">Powered by Google Gemini</div>
    </div>
</div>
