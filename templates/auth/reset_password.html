{% extends "base.html" %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card glass-panel">
        <div class="auth-header">
            <h1 class="gradient-text">Choose New Password</h1>
            <p class="text-muted">Enter a strong password to secure your account</p>
        </div>

        <form method="POST" class="auth-form" id="resetForm">
            <div class="form-group">
                <label class="form-label" for="password">New Password</label>
                <div class="password-input-wrap">
                    <input type="password" id="password" name="password" class="form-input" required minlength="6">
                    <button type="button" class="toggle-password" tabindex="-1">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <div class="password-strength">
                    <div class="strength-bar"></div>
                </div>
                <small class="strength-text text-muted">Password strength</small>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-input" required minlength="6">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Reset Password</button>
        </form>
    </div>
</div>

<style>
.auth-wrapper {
    min-height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
}
.auth-card {
    width: 100%;
    max-width: 400px;
    padding: 2.5rem;
}
.auth-header {
    text-align: center;
    margin-bottom: 2rem;
}
.password-input-wrap {
    position: relative;
}
.toggle-password {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
}
.password-strength {
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    margin-top: 8px;
    overflow: hidden;
}
.strength-bar {
    height: 100%;
    width: 0;
    transition: all 0.3s ease;
}
</style>

<script>
document.addEventListener('DOMContentLoaded', () => {
    // Password visibility toggle
    const toggleBtn = document.querySelector('.toggle-password');
    const pwdInput = document.getElementById('password');
    
    if (toggleBtn && pwdInput) {
        toggleBtn.addEventListener('click', () => {
            const type = pwdInput.getAttribute('type') === 'password' ? 'text' : 'password';
            pwdInput.setAttribute('type', type);
            toggleBtn.innerHTML = type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
        });
    }

    // Password strength
    const strengthBar = document.querySelector('.strength-bar');
    const strengthText = document.querySelector('.strength-text');
    
    if (pwdInput && strengthBar) {
        pwdInput.addEventListener('input', (e) => {
            const val = e.target.value;
            let strength = 0;
            if (val.length >= 6) strength++;
            if (val.match(/[A-Z]/)) strength++;
            if (val.match(/[0-9]/)) strength++;
            if (val.match(/[^A-Za-z0-9]/)) strength++;
            
            let color = 'var(--danger)';
            let text = 'Weak';
            let width = '25%';
            
            if (strength === 2) { color = 'var(--warning)'; text = 'Fair'; width = '50%'; }
            if (strength === 3) { color = '#3b82f6'; text = 'Good'; width = '75%'; }
            if (strength >= 4) { color = 'var(--success)'; text = 'Strong'; width = '100%'; }
            if (val.length === 0) { width = '0'; text = 'Password strength'; }
            
            strengthBar.style.width = width;
            strengthBar.style.backgroundColor = color;
            if(strengthText) strengthText.textContent = text;
            if(strengthText) strengthText.style.color = val.length ? color : 'var(--text-muted)';
        });
    }
});
</script>
{% endblock %}
