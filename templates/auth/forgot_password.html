{% extends "base.html" %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card glass-panel">
        <div class="auth-header">
            <h1 class="gradient-text">Reset Password</h1>
            <p class="text-muted">Enter your email to receive a reset link</p>
        </div>

        {% if success %}
        <div class="success-state" style="text-align: center; padding: 2rem 0;">
            <div class="icon-circle" style="background: rgba(16, 185, 129, 0.1); color: var(--success); width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem;">
                <i class="fas fa-check" style="font-size: 24px;"></i>
            </div>
            <h3 style="margin-bottom: 1rem;">Link Sent!</h3>
            <p class="text-muted" style="margin-bottom: 2rem;">If that email exists in our system, a password reset link has been sent.</p>
            <a href="{{ url_for('auth.login') }}" class="btn btn-primary" style="width: 100%;">Return to Login</a>
        </div>
        {% else %}
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-input" required autofocus>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Send Reset Link</button>
            <div class="auth-footer" style="margin-top: 1.5rem; text-align: center;">
                <a href="{{ url_for('auth.login') }}" class="text-muted" style="text-decoration: none; font-size: 0.9rem;">
                    <i class="fas fa-arrow-left"></i> Back to Login
                </a>
            </div>
        </form>
        {% endif %}
    </div>
</div>

<style>
.auth-wrapper {
    min-height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
}
.auth-card {
    width: 100%;
    max-width: 400px;
    padding: 2.5rem;
}
.auth-header {
    text-align: center;
    margin-bottom: 2rem;
}
</style>
{% endblock %}
